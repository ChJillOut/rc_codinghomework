version: '3.8'
services:
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: rabbitmq-broker
    ports:
      - "5672:5672"   # Standard AMQP port your app connects to
      - "15672:15672" # The web management UI port
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
